<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="clip"><rect width="64" height="64" rx="14"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F2E8C8"/>
      <stop offset="100%" stop-color="#E2CF78"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Background -->
    <rect width="64" height="64" fill="url(#bg)"/>

    <!-- SHIRT / SHOULDERS — wide so they peek out behind laptop on both sides -->
    <ellipse cx="32" cy="46" rx="26" ry="9" fill="#1D3A5F"/>

    <!-- LAPTOP — clearly in front of body -->
    <!-- Laptop screen back -->
    <rect x="10" y="47" width="44" height="17" rx="3.5" fill="#222222"/>
    <!-- Top highlight edge (lid rim) -->
    <rect x="10" y="47" width="44" height="3" rx="3.5" fill="#2E2E2E"/>
    <!-- </> symbol -->
    <text x="32" y="60" text-anchor="middle"
      font-family="'Courier New', monospace" font-size="9" font-weight="bold"
      fill="#7EB8D4" letter-spacing="1">&lt;/&gt;</text>
    <!-- Keyboard base (thin strip at very bottom) -->
    <rect x="8" y="63" width="48" height="3" rx="2" fill="#1A1A1A"/>

    <!-- NECK -->
    <rect x="28.5" y="35" width="7" height="12" rx="3" fill="#B07040"/>

    <!-- EARS -->
    <ellipse cx="18.5" cy="23" rx="3.2" ry="4.2" fill="#B07040"/>
    <ellipse cx="18.5" cy="23" rx="1.8" ry="2.8" fill="#8C5830"/>
    <ellipse cx="45.5" cy="23" rx="3.2" ry="4.2" fill="#B07040"/>
    <ellipse cx="45.5" cy="23" rx="1.8" ry="2.8" fill="#8C5830"/>

    <!-- FACE -->
    <ellipse cx="32" cy="23" rx="13.5" ry="15" fill="#B07040"/>

    <!-- ROUGH / TEXTURED HAIR -->
    <!-- Base mass -->
    <ellipse cx="32" cy="11" rx="14.5" ry="10" fill="#120A00"/>
    <!-- Irregular tufts — different angles and sizes for that rough natural look -->
    <ellipse cx="32"  cy="2"   rx="3"   ry="6"   transform="rotate(0,32,2)"    fill="#120A00"/>
    <ellipse cx="24"  cy="4"   rx="2.5" ry="5.5" transform="rotate(-18,24,4)"  fill="#120A00"/>
    <ellipse cx="40"  cy="4"   rx="2.5" ry="5.5" transform="rotate(18,40,4)"   fill="#120A00"/>
    <ellipse cx="17"  cy="8"   rx="2.2" ry="5"   transform="rotate(-38,17,8)"  fill="#120A00"/>
    <ellipse cx="47"  cy="8"   rx="2.2" ry="5"   transform="rotate(38,47,8)"   fill="#120A00"/>
    <ellipse cx="13"  cy="16"  rx="2"   ry="4.5" transform="rotate(-58,13,16)" fill="#120A00"/>
    <ellipse cx="51"  cy="16"  rx="2"   ry="4.5" transform="rotate(58,51,16)"  fill="#120A00"/>
    <ellipse cx="27.5" cy="3"  rx="2"   ry="4.5" transform="rotate(-8,27,3)"   fill="#120A00"/>
    <ellipse cx="36.5" cy="3"  rx="2"   ry="4.5" transform="rotate(8,37,3)"    fill="#120A00"/>
    <ellipse cx="21"  cy="6"   rx="2"   ry="4"   transform="rotate(-28,21,6)"  fill="#120A00"/>
    <ellipse cx="43"  cy="6"   rx="2"   ry="4"   transform="rotate(28,43,6)"   fill="#120A00"/>
    <!-- Fill gaps in base -->
    <ellipse cx="32" cy="12" rx="13.5" ry="9" fill="#120A00"/>

    <!-- EYES -->
    <ellipse cx="25" cy="22" rx="4" ry="4.5" fill="white"/>
    <circle cx="25.5" cy="22.5" r="2.8" fill="#1A0A00"/>
    <circle cx="27"   cy="21"   r="1.1" fill="white" opacity="0.85"/>

    <ellipse cx="39" cy="22" rx="4" ry="4.5" fill="white"/>
    <circle cx="39.5" cy="22.5" r="2.8" fill="#1A0A00"/>
    <circle cx="41"   cy="21"   r="1.1" fill="white" opacity="0.85"/>

    <!-- Upper eyelid crease -->
    <path d="M 21.5 20 Q 25 18 28.5 20" stroke="#8C5030" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    <path d="M 35.5 20 Q 39 18 42.5 20" stroke="#8C5030" stroke-width="1.1" fill="none" stroke-linecap="round"/>

    <!-- NOSE -->
    <path d="M 30 28.5 Q 32 31 34 28.5" stroke="#8C5030" stroke-width="1.3" fill="none" stroke-linecap="round"/>

    <!-- MOUTH -->
    <path d="M 27 33 Q 32 37.5 37 33" stroke="#7A3E20" stroke-width="1.9" fill="none" stroke-linecap="round"/>

  </g>
</svg>
